<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP TEN | The Best Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; color: #ffffff; margin: 0; padding: 0; width: 100vw; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: url('images/indexbg.jpg'); background-size: cover; background-position: center; filter: brightness(0.3) saturate(0.8); }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .text-gold-gradient { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .footer-premium { background-color: rgba(18, 16, 13, 0.8); border: 1px solid #2d261e; border-radius: 16px; backdrop-filter: blur(10px); }
        .shop-btn { transition: all 0.3s ease; }
        .shop-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(191, 149, 63, 0.6); border-color: #fcf6ba; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="bg-container"></div>

    <header class="w-full max-w-7xl flex justify-start items-center mb-10">
        <div class="text-left">
            <h1 class="text-gold-gradient text-3xl font-bold tracking-widest">TOP10</h1>
            <p class="text-[10px] tracking-[0.3em] uppercase text-gray-400">The Best Only</p>
        </div>
    </header>

    <main class="flex flex-col items-center justify-center text-center w-full max-w-5xl flex-grow">
        <h2 class="text-gold-gradient text-5xl md:text-8xl font-bold mb-6 leading-tight">Only the Best<br>Nothing Else</h2>
        
        <!-- Premium Description: Refined color and spacing for a high-end look -->
        <p class="text-gray-300 max-w-lg mb-10 text-base md:text-lg font-light tracking-[0.05em] leading-relaxed italic opacity-90">
    <span class="text-white">Curated precision.</span> We distill the noise into the ten finest selections, ensuring your time is spent only on the absolute best.
</p>
        
        <a href="shop.html" class="mb-8">
            <button class="shop-btn bg-black/50 border border-[#bf953f] px-10 py-4 rounded-full font-bold flex items-center gap-3 text-lg">
                <span class="text-gold-gradient">SHOP NOW</span>
            </button>
        </a>
    </main>

    <!-- Fixed Footer: Equal spacing and alignment -->
    <footer class="w-full max-w-6xl footer-premium p-4 md:p-6 mt-12 mb-4">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-y-6 gap-x-2">
            <!-- Footer Item -->
            <div class="flex flex-col items-center justify-center text-center gap-1">
                <div class="text-2xl text-[#d4af37]">☆</div>
                <h4 class="font-bold text-gold-gradient text-[10px] md:text-xs uppercase tracking-widest">Best in Class</h4>
            </div>
            <!-- Footer Item -->
            <div class="flex flex-col items-center justify-center text-center gap-1">
                <div class="text-2xl text-[#d4af37]">☺</div>
                <h4 class="font-bold text-gold-gradient text-[10px] md:text-xs uppercase tracking-widest">Expert Pick</h4>
            </div>
            <!-- Footer Item -->
            <div class="flex flex-col items-center justify-center text-center gap-1">
                <div class="text-2xl text-[#d4af37]">♕</div>
                <h4 class="font-bold text-gold-gradient text-[10px] md:text-xs uppercase tracking-widest">Premium</h4>
            </div>
            <!-- Footer Item -->
            <div class="flex flex-col items-center justify-center text-center gap-1">
                <div class="text-2xl text-[#d4af37]">♲</div>
                <h4 class="font-bold text-gold-gradient text-[10px] md:text-xs uppercase tracking-widest">Monthly</h4>
            </div>
        </div>
    </footer>

</body>
</html>
