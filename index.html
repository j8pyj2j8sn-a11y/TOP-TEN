<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TOP X - Discover</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #222222;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #d1d1d1;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .nav-container {
            position: absolute;
            top: 30px;
            right: 30px;
        }

        .about-btn {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            padding: 8px 20px;
            border: 1px solid #4a4a4a;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .about-btn:hover {
            color: #ffffff;
            border-color: #ffffff;
        }

        .card {
            width: 640px;
            aspect-ratio: 16 / 9;
            background-color: #555555;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: inset 10px 10px 20px #444444, 
                        inset -10px -10px 20px #666666;
            border: 1px solid #4a4a4a;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(227, 213, 202, 0.15), 
                        inset 10px 10px 20px #444444, 
                        inset -10px -10px 20px #666666;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin: 0 0 30px 0;
            text-transform: uppercase;
        }

        /* Light Gold Titanium Styling */
        p {
            color: #E3D5CA;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.25rem;
            font-weight: 400;
            text-align: center;
            line-height: 1.6;
            margin: 0 40px 40px 40px;
            letter-spacing: 0.8px;
            /* Subtle metallic glow */
            text-shadow: 0 0 10px rgba(227, 213, 202, 0.3);
            opacity: 0.95;
        }

        .explore-btn {
            padding: 15px 45px;
            background: linear-gradient(145deg, #333333, #2a2a2a);
            border: 1px solid #1a1a1a;
            border-radius: 50px;
            color: #E3D5CA;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .explore-btn:hover {
            transform: scale(1.05);
            border-color: #E3D5CA;
        }
    </style>
</head>
<body>

    <div class="logo">TOP X</div>

    <div class="nav-container">
        <a href="#" class="about-btn">ABOUT</a>
    </div>

    <div class="card">
        <h1>DISCOVER</h1>
        <p>
            Excellence is not a destination,<br>
            but the very ground upon which we stand,<br>
            ensuring that every selection meets a standard beyond reproach.
        </p>
        <a href="shop.html" class="explore-btn">EXPLORE</a>
    </div>

</body>
</html>
