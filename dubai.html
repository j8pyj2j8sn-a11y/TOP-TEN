<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOCAL PRODUCT | The Best Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #ffffff; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .nav-link { font-size: 0.70rem; letter-spacing: 0.2em; text-transform: uppercase; color: #222222; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover { color: #000000; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>

    <header class="w-full px-6 pt-8 pb-8 flex flex-col items-center bg-white">
        <div class="text-center mb-10">
            <p class="text-xl italic mb-1 font-serif text-[#333]">The</p>
            <h1 class="text-5xl md:text-7xl font-normal tracking-tight leading-[0.8] text-black">LOCAL PRODUCT</h1>
        </div>
        
        <!-- Navigation with Region Dropdown -->
        <nav x-data="{ open: false }" class="relative z-20 flex gap-12 border-b border-gray-200 w-full justify-center pb-8 items-center">
            <a href="partner/partner.html" class="nav-link">Stores</a>
            <a href="deal.html" class="nav-link">deal</a>
            
            <!-- Region Dropdown -->
            <div class="relative">
                <button @click="open = !open" @click.away="open = false" class="nav-link flex items-center gap-1">
                    Region
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                
                <div
                    x-cloak
                    x-show="open"
                    x-transition.origin.top
                    class="absolute left-1/2 -translate-x-1/2 top-full mt-4 w-40 bg-white rounded-lg shadow-xl border border-gray-200 overflow-hidden z-[99999]"
                >
                    <a href="index.html" class="block px-4 py-2 text-black hover:bg-gray-100 uppercase text-[10px] text-center">india</a>
                    <a href="uk.html" class="block px-4 py-2 text-black hover:bg-gray-100 uppercase text-[10px] text-center">uk</a>
                    <a href="dubai.html" class="block px-4 py-2 text-black hover:bg-gray-100 uppercase text-[10px] text-center">dubai</a>
                    <a href="qatar.html" class="block px-4 py-2 text-black hover:bg-gray-100 uppercase text-[10px] text-center">qatar</a>
                    <a href="saudi.html" class="block px-4 py-2 text-black hover:bg-gray-100 uppercase text-[10px] text-center">saudi</a>
                </div>
            </div>

            <a href="about.html" class="nav-link">About</a>
        </nav>
    </header>

   <!-- Main Content -->
    <main class="w-full bg-[#222222] text-white">
        <div class="flex flex-col items-center text-center w-full px-6 py-40">
            <h2 class="text-4xl md:text-6xl font-normal mb-8 leading-tight italic">Coming Soon...</h2>
            <p class="max-w-lg text-sm font-light tracking-[0.2em] uppercase text-[#c0c0c0]">
                We are crafting something exceptional.
            </p>
        </div>

        <footer class="w-full py-16 border-t border-[#4a4f54]">
            <div class="w-full px-6 grid grid-cols-2 md:grid-cols-4 gap-12 text-center text-[#c0c0c0]">
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Best in Class</h4>
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Expert Pick</h4>
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Premium</h4>
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Frequently</h4>
            </div>
        </footer>
    </main>
</body>
</html>
